<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}DFOS{% endblock %}</title>
  <script>
    try {
      var _t = localStorage.getItem("dfos-theme");
      document.documentElement.setAttribute(
        "data-theme",
        _t === "dark" || _t === "light" ? _t : "light"
      );
    } catch (e) {
      document.documentElement.setAttribute("data-theme", "light");
    }
  </script>
  <link rel="stylesheet" href="/static/css/notion_like.css" />
  {% block extra_head %}{% endblock %}
</head>
<body{% block body_attrs %}{% endblock %}>
  <button
    type="button"
    id="dfos-theme-toggle"
    class="dfos-theme-toggle"
    title="深色模式"
    aria-label="切换深色模式"
  >
    <svg class="dfos-theme-toggle__icon" width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path
        fill="none"
        stroke="currentColor"
        stroke-width="1.6"
        stroke-linecap="round"
        stroke-linejoin="round"
        d="M21.75 15A9.72 9.72 0 0 1 18 15.75c-5.38 0-9.75-4.37-9.75-9.75 0-1.33.27-2.6.75-3.75A9.75 9.75 0 0 0 3 11.25 9.75 9.75 0 0 0 12.75 21 9.75 9.75 0 0 0 21.75 15Z"
      />
    </svg>
  </button>
  {% block body %}{% endblock %}
  <script src="/static/js/theme.js"></script>
  {% block page_scripts %}{% endblock %}
</body>
</html>
