name: Docker Package Deploy

permissions:
  contents: write  # git-auto-commit-action 写入 VERSION

on:
  workflow_dispatch:  # 仅手动触发（不再在 push 时自动构建部署）

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: DEOS
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Bump version
        id: version
        run: |
          VERSION=$(cat VERSION)
          echo "current_version=$VERSION" >> $GITHUB_OUTPUT
          # 递增 patch 版本
          IFS='.' read -ra V <<< "$VERSION"
          V[-1]=$((V[-1] + 1))
          NEW_VERSION="${V[0]}.${V[1]}.${V[-1]}"
          echo "$NEW_VERSION" > VERSION
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit version bump
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: bump version to ${{ steps.version.outputs.new_version }}"
          file_pattern: VERSION

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Alibaba Cloud Container Registry
        uses: docker/login-action@v3
        with:
          registry: crpi-y2mlko5kogge3g4i.cn-hongkong.personal.cr.aliyuncs.com
          username: ${{ secrets.DOCKER_REGISTRY_USER }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: crpi-y2mlko5kogge3g4i.cn-hongkong.personal.cr.aliyuncs.com/dfos/design
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=v${{ steps.version.outputs.new_version }},enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=crpi-y2mlko5kogge3g4i.cn-hongkong.personal.cr.aliyuncs.com/dfos/design:latest
          cache-to: type=inline

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        env:
          DOCKER_REGISTRY_USER: ${{ secrets.DOCKER_REGISTRY_USER }}
          DOCKER_REGISTRY_PASSWORD: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
          DEPLOY_DIR: /DEOS
          DEPLOY_TAG: v${{ steps.version.outputs.new_version }}
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT || 22 }}
          username: ${{ secrets.SSH_USER || 'root' }}
          password: ${{ secrets.SSH_PASSWORD }}
          command_timeout: 15m
          envs: DOCKER_REGISTRY_USER,DOCKER_REGISTRY_PASSWORD,DEPLOY_DIR,DEPLOY_TAG
          script_path: scripts/deploy-server.sh