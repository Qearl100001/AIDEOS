name: Docker Package Deploy

on:
  workflow_dispatch:  # 手动触发
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'requirements.txt'
      - '.github/workflows/docker-package-deploy.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:DEOS
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Bump version
        id: version
        run: |
          VERSION=$(cat VERSION)
          echo "current_version=$VERSION" >> $GITHUB_OUTPUT
          # 递增 patch 版本
          IFS='.' read -ra V <<< "$VERSION"
          V[-1]=$((V[-1] + 1))
          NEW_VERSION="${V[0]}.${V[1]}.${V[-1]}"
          echo "$NEW_VERSION" > VERSION
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit version bump
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: bump version to ${{ steps.version.outputs.new_version }}"
          file_pattern: VERSION

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Alibaba Cloud Container Registry
        uses: docker/login-action@v3
        with:
          registry: crpi-y2mlko5kogge3g4i.cn-hongkong.personal.cr.aliyuncs.com
          username: ${{ secrets.DOCKER_REGISTRY_USER }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: crpi-y2mlko5kogge3g4i.cn-hongkong.personal.cr.aliyuncs.com/dfos/design
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=v${{ steps.version.outputs.new_version }},enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=crpi-y2mlko5kogge3g4i.cn-hongkong.personal.cr.aliyuncs.com/dfos/design:latest
          cache-to: type=inline

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command: |
            cd /app
            echo "${{ secrets.DOCKER_REGISTRY_PASSWORD }}" | docker login crpi-y2mlko5kogge3g4i.cn-hongkong.personal.cr.aliyuncs.com -u ${{ secrets.DOCKER_REGISTRY_USER }} --password-stdin
            docker-compose pull
            docker-compose up -d
            docker logout crpi-y2mlko5kogge3g4i.cn-hongkong.personal.cr.aliyuncs.com